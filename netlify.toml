# ============================================================
# Netlify Configuration — Multi-Environment
# ============================================================
# Staging site: deploys from `main` branch
# Production site: deploys from `production` branch
# ============================================================

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID,FIREBASE_PROJECT_ID,FINIK_API_KEY,FINIK_SECRET_KEY"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  framework = "#custom"

# ---- Context: Production branch ----
[context.production]
  command = "npm run build:prod"

# ---- Context: Branch deploys & Deploy Previews ----
[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# ---- SPA routing — all non-file routes go to index.html ----
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---- Functions ----
[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"
  included_files = ["netlify/functions/**"]

# ---- Scheduled functions (cron) ----
# Daily debt/payment reminders to students + overdue alerts to admins.
[functions."debt-reminders"]
  schedule = "0 9 * * *"

# Monthly auto-billing: generate invoices for monthly-format courses on the 1st.
[functions."monthly-billing"]
  schedule = "0 6 1 * *"

# Evening reminder of tomorrow's lessons to students & teachers.
[functions."lesson-reminders"]
  schedule = "0 14 * * *"

# Weekly owner digest (Monday morning): revenue, debts, new students & leads.
[functions."weekly-digest"]
  schedule = "0 6 * * 1"

# Daily reminder to follow up on untouched leads.
[functions."lead-followups"]
  schedule = "0 8 * * *"

# Weekly alert of at-risk students (absences / overdue payments) to staff.
[functions."risk-alerts"]
  schedule = "0 7 * * 3"

# ---- Security headers ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.googleusercontent.com https://firebasestorage.googleapis.com; media-src 'self' blob: https://firebasestorage.googleapis.com https://*.youtube.com https://*.ytimg.com; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com https://apis.google.com https://*.firebaseio.com https://*.cloudfunctions.net https://firebaseinstallations.googleapis.com https://fcmregistrations.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://generativelanguage.googleapis.com wss://*.firebaseio.com; frame-src https://*.youtube.com https://*.firebaseapp.com https://accounts.google.com; object-src 'none'; base-uri 'self'"
